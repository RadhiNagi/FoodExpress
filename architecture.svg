<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">FoodExpress — End-to-End Architecture</text>

  <!-- === DATA SOURCES === -->
  <text x="95" y="70" text-anchor="middle" font-size="11" fill="#888" font-weight="600">DATA SOURCES</text>

  <!-- FastAPI App -->
  <rect x="30" y="85" width="130" height="55" rx="8" fill="#FFF0E8" stroke="#E85D30" stroke-width="1.5"/>
  <text x="95" y="107" text-anchor="middle" font-size="12" font-weight="600" fill="#E85D30">FastAPI App</text>
  <text x="95" y="123" text-anchor="middle" font-size="10" fill="#C94820">Order Simulator</text>

  <!-- GitHub -->
  <rect x="30" y="160" width="130" height="55" rx="8" fill="#FFF0E8" stroke="#E85D30" stroke-width="1.5"/>
  <text x="95" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#E85D30">GitHub</text>
  <text x="95" y="198" text-anchor="middle" font-size="10" fill="#C94820">Bulk Orders JSON</text>

  <!-- === INGESTION === -->
  <text x="275" y="70" text-anchor="middle" font-size="11" fill="#888" font-weight="600">INGESTION</text>

  <!-- Event Hub -->
  <rect x="210" y="85" width="130" height="55" rx="8" fill="#E6F1FB" stroke="#276EF1" stroke-width="1.5"/>
  <text x="275" y="107" text-anchor="middle" font-size="12" font-weight="600" fill="#276EF1">Azure Event Hub</text>
  <text x="275" y="123" text-anchor="middle" font-size="10" fill="#185FA5">Kafka Protocol</text>

  <!-- Data Factory -->
  <rect x="210" y="160" width="130" height="55" rx="8" fill="#E6F1FB" stroke="#276EF1" stroke-width="1.5"/>
  <text x="275" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#276EF1">Data Factory</text>
  <text x="275" y="198" text-anchor="middle" font-size="10" fill="#185FA5">Metadata-Driven</text>

  <!-- Arrows: Sources → Ingestion -->
  <line x1="160" y1="112" x2="207" y2="112" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="160" y1="187" x2="207" y2="187" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- === DATABRICKS === -->
  <rect x="370" y="55" width="360" height="220" rx="12" fill="#FFF" stroke="#DDD" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="550" y="70" text-anchor="middle" font-size="11" fill="#888" font-weight="600">DATABRICKS (PySpark Structured Streaming)</text>

  <!-- Bronze -->
  <rect x="390" y="85" width="100" height="55" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="440" y="107" text-anchor="middle" font-size="12" font-weight="700" fill="#854F0B">Bronze</text>
  <text x="440" y="123" text-anchor="middle" font-size="10" fill="#854F0B">Raw Data</text>

  <!-- Silver -->
  <rect x="510" y="85" width="100" height="55" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
  <text x="560" y="107" text-anchor="middle" font-size="12" font-weight="700" fill="#444441">Silver</text>
  <text x="560" y="123" text-anchor="middle" font-size="10" fill="#5F5E5A">Cleaned + JOINs</text>

  <!-- Gold -->
  <rect x="630" y="85" width="100" height="55" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <text x="680" y="107" text-anchor="middle" font-size="12" font-weight="700" fill="#3B6D11">Gold</text>
  <text x="680" y="123" text-anchor="middle" font-size="10" fill="#3B6D11">Star Schema</text>

  <!-- Arrows inside Databricks -->
  <line x1="490" y1="112" x2="507" y2="112" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="610" y1="112" x2="627" y2="112" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Arrows: Ingestion → Bronze -->
  <line x1="340" y1="112" x2="387" y2="112" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <path d="M340 187 L365 187 L365 112 L387 112" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Bronze detail -->
  <text x="440" y="165" text-anchor="middle" font-size="9" fill="#854F0B">orders_raw</text>
  <text x="440" y="178" text-anchor="middle" font-size="9" fill="#854F0B">bulk_orders</text>
  <text x="440" y="191" text-anchor="middle" font-size="9" fill="#854F0B">6 mapping tables</text>

  <!-- Silver detail -->
  <text x="560" y="165" text-anchor="middle" font-size="9" fill="#5F5E5A">stg_orders</text>
  <text x="560" y="178" text-anchor="middle" font-size="9" fill="#5F5E5A">silver_obt (42 cols)</text>
  <text x="560" y="191" text-anchor="middle" font-size="9" fill="#5F5E5A">6 LEFT JOINs</text>

  <!-- Gold detail -->
  <text x="680" y="165" text-anchor="middle" font-size="9" fill="#3B6D11">fact_orders</text>
  <text x="680" y="178" text-anchor="middle" font-size="9" fill="#3B6D11">6 dimensions</text>
  <text x="680" y="191" text-anchor="middle" font-size="9" fill="#3B6D11">SCD Type 1 + 2</text>

  <!-- Delta Lake badge -->
  <rect x="460" y="210" width="180" height="28" rx="14" fill="#E6F1FB" stroke="#276EF1" stroke-width="1"/>
  <text x="550" y="229" text-anchor="middle" font-size="11" font-weight="600" fill="#276EF1">Delta Lake (ACID)</text>

  <!-- ADLS -->
  <rect x="370" y="250" width="360" height="30" rx="6" fill="#F8F9FA" stroke="#DDD" stroke-width="1"/>
  <text x="550" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#888">Azure Data Lake Storage Gen2 (Bronze / Silver / Gold containers)</text>

  <!-- === STAR SCHEMA DETAIL === -->
  <text x="450" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#1A1A2E">Star Schema — Gold Layer</text>

  <!-- Fact table (center) -->
  <rect x="350" y="335" width="200" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="2"/>
  <text x="450" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#854F0B">fact_orders</text>
  <text x="450" y="377" text-anchor="middle" font-size="9" fill="#854F0B">7 FKs + 10 measures + timestamps</text>

  <!-- Dimensions around the fact -->
  <!-- dim_customer -->
  <rect x="30" y="330" width="120" height="40" rx="6" fill="#E6F1FB" stroke="#276EF1" stroke-width="1"/>
  <text x="90" y="347" text-anchor="middle" font-size="10" font-weight="600" fill="#185FA5">dim_customer</text>
  <text x="90" y="362" text-anchor="middle" font-size="9" fill="#185FA5">SCD 1</text>
  <line x1="150" y1="355" x2="347" y2="360" stroke="#276EF1" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <!-- dim_driver -->
  <rect x="30" y="385" width="120" height="40" rx="6" fill="#E6F1FB" stroke="#276EF1" stroke-width="1"/>
  <text x="90" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#185FA5">dim_driver</text>
  <text x="90" y="417" text-anchor="middle" font-size="9" fill="#185FA5">SCD 1</text>
  <line x1="150" y1="400" x2="347" y2="375" stroke="#276EF1" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <!-- dim_restaurant -->
  <rect x="170" y="430" width="130" height="40" rx="6" fill="#E6F1FB" stroke="#276EF1" stroke-width="1"/>
  <text x="235" y="447" text-anchor="middle" font-size="10" font-weight="600" fill="#185FA5">dim_restaurant</text>
  <text x="235" y="462" text-anchor="middle" font-size="9" fill="#185FA5">SCD 1</text>
  <line x1="270" y1="430" x2="400" y2="395" stroke="#276EF1" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <!-- dim_payment -->
  <rect x="600" y="430" width="120" height="40" rx="6" fill="#E6F1FB" stroke="#276EF1" stroke-width="1"/>
  <text x="660" y="447" text-anchor="middle" font-size="10" font-weight="600" fill="#185FA5">dim_payment</text>
  <text x="660" y="462" text-anchor="middle" font-size="9" fill="#185FA5">SCD 1</text>
  <line x1="620" y1="430" x2="500" y2="395" stroke="#276EF1" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <!-- dim_location (SCD2 - special color) -->
  <rect x="750" y="330" width="120" height="40" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="810" y="347" text-anchor="middle" font-size="10" font-weight="700" fill="#3C3489">dim_location</text>
  <text x="810" y="362" text-anchor="middle" font-size="9" fill="#534AB7">SCD 2 (history)</text>
  <line x1="750" y1="355" x2="553" y2="360" stroke="#534AB7" stroke-width="1" marker-end="url(#arrowPurple)"/>

  <!-- dim_order_status -->
  <rect x="750" y="385" width="120" height="40" rx="6" fill="#E6F1FB" stroke="#276EF1" stroke-width="1"/>
  <text x="810" y="402" text-anchor="middle" font-size="10" font-weight="600" fill="#185FA5">dim_order_status</text>
  <text x="810" y="417" text-anchor="middle" font-size="9" fill="#185FA5">SCD 1</text>
  <line x1="750" y1="400" x2="553" y2="375" stroke="#276EF1" stroke-width="1" marker-end="url(#arrowBlue)"/>

  <!-- Footer -->
  <text x="450" y="505" text-anchor="middle" font-size="10" fill="#AAA">Built by Radhika Bodapati | Python • FastAPI • Azure Event Hub • Data Factory • Databricks • PySpark • Delta Lake</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#276EF1" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>